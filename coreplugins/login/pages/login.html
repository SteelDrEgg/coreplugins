<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MinimalPanel</title>
    <link rel="stylesheet" href="/assets/css/scheme.css">
    <link rel="stylesheet" href="/assets/css/daisyui@5.css" type="text/css">
    <script src="/assets/css/tailwindcss@4"></script>
</head>
<body class="light min-h-screen bg-base-200 text-base-content">
    <main class="grid min-h-screen place-items-center px-4 py-8">
        <div class="card w-full max-w-md rounded-lg border border-base-300 bg-base-100 shadow-xl">
            <div class="card-body gap-6 p-6 sm:p-8">
                <div class="text-center">
                    <h1 class="text-3xl font-semibold tracking-normal">MinimalPanel</h1>
                    <p class="mt-2 text-sm text-base-content/60">Please sign in to continue</p>
                </div>

                <form id="loginForm" class="grid gap-4">
                    <label class="grid gap-2">
                        <span class="text-sm font-medium text-base-content/80">Username</span>
                        <input type="text" id="username" name="username" class="input w-full" autocomplete="username" required>
                    </label>

                    <label class="grid gap-2">
                        <span class="text-sm font-medium text-base-content/80">Password</span>
                        <input type="password" id="password" name="password" class="input w-full" autocomplete="current-password" required>
                    </label>

                    <button type="submit" class="btn btn-primary mt-2 w-full" id="loginButton">
                        Sign In
                    </button>
                </form>

                <div id="errorMessage" class="alert alert-error hidden text-sm"></div>
                <div id="successMessage" class="alert alert-success hidden text-sm"></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = document.getElementById('loginButton');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Hide previous messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Disable button during request
            button.disabled = true;
            button.textContent = 'Signing in...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successMessage.textContent = 'Login successful! Redirecting...';
                    successMessage.style.display = 'block';
                    
                    // Redirect to dashboard after successful login
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    errorMessage.textContent = data.message || 'Login failed';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                button.disabled = false;
                button.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
