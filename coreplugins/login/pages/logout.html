<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - MinimalPanel</title>
    <link rel="stylesheet" href="/assets/css/scheme.css">
    <link rel="stylesheet" href="/assets/css/daisyui@5.css" type="text/css">
    <script src="/assets/css/tailwindcss@4"></script>
</head>
<body class="light min-h-screen bg-base-200 text-base-content">
    <main class="grid min-h-screen place-items-center px-4 py-8">
        <div class="card w-full max-w-md rounded-lg border border-base-300 bg-base-100 shadow-xl">
            <div class="card-body gap-6 p-6 text-center sm:p-8">
                <div>
                    <h1 class="text-3xl font-semibold tracking-normal">MinimalPanel</h1>
                    <p class="mt-2 text-base text-base-content/70">Are you sure you want to sign out?</p>
                </div>

                <div class="grid gap-3">
                    <button id="logoutButton" class="btn btn-error w-full">
                        Sign Out
                    </button>

                    <a href="/pages/login.html" class="btn btn-ghost w-full">
                        Back to Login
                    </a>
                </div>

                <div id="statusMessage" class="alert alert-success hidden text-sm"></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('logoutButton').addEventListener('click', async function() {
            const button = document.getElementById('logoutButton');
            const statusMessage = document.getElementById('statusMessage');
            
            // Disable button during request
            button.disabled = true;
            button.textContent = 'Signing out...';
            
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusMessage.textContent = 'Logged out successfully! Redirecting...';
                    statusMessage.style.display = 'block';
                    
                    // Redirect to login page after successful logout
                    setTimeout(() => {
                        window.location.href = '/pages/login.html';
                    }, 1000);
                } else {
                    button.disabled = false;
                    button.textContent = 'Sign Out';
                }
            } catch (error) {
                button.disabled = false;
                button.textContent = 'Sign Out';
            }
        });
        
        // Auto-logout if already logged out
        window.addEventListener('load', async function() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();
                
                if (!data.success) {
                    // Already logged out, redirect to login
                    window.location.href = '/pages/login.html';
                }
            } catch (error) {
                // If check fails, assume logged out
                window.location.href = '/pages/login.html';
            }
        });
    </script>
</body>
</html>
