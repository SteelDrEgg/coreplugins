<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<link rel="stylesheet" href="/assets/css/scheme.css" />
	</head>
	<body class="light" data-sveltekit-preload-data="hover">
		<script>
			try {
				const theme = localStorage.getItem('arupa.theme') === 'dark' ? 'dark' : 'light';
				document.body.classList.remove('light', 'dark');
				document.body.classList.add(theme);
				document.documentElement.style.colorScheme = theme;
			} catch {
				// Keep the default light theme when storage is unavailable.
			}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
