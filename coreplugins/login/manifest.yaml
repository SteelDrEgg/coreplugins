version: 1
transports:
  - id: login-page
    type: static
    source: pages/login.html
  - id: logout-page
    type: static
    source: pages/logout.html
routes:
  - id: login-page
    transport: login-page
    http:
      pattern: /pages/login.html
  - id: logout-page
    transport: logout-page
    http:
      pattern: /pages/logout.html
