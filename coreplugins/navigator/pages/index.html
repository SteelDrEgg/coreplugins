<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/scheme.css" type="text/css">
    <link rel="stylesheet" href="/assets/css/daisyui@5.css" type="text/css">
    <script src="/assets/css/tailwindcss@4"></script>
    <title>MinimalPanel</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .mp-icon {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            background: currentColor;
            mask: var(--icon-url) no-repeat center;
            mask-size: contain;
            -webkit-mask: var(--icon-url) no-repeat center;
            -webkit-mask-size: contain;
        }

        .desktop-logo-icon {
            width: 2.25rem;
            height: 2.25rem;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            width: 3.75rem;
            min-height: 4.5rem;
            padding: 0;
            color: var(--color-neutral);
            border: 0;
            background: transparent;
            box-shadow: none;
            cursor: pointer;
            font-weight: 500;
            transition: color 160ms ease;
        }

        .nav-item.is-active {
            color: var(--color-primary);
        }

        .nav-item:hover,
        .nav-item:focus-visible {
            color: var(--color-secondary);
            background: transparent;
            outline: none;
        }

        .nav-icon-box {
            display: grid;
            width: 2.25rem;
            height: 2.25rem;
            place-items: center;
            border-radius: 0.375rem;
            background: transparent;
            color: currentColor;
            transition: background-color 160ms ease, color 160ms ease;
        }

        .nav-item.is-active .nav-icon-box {
            background: var(--color-primary);
            color: var(--color-base-100);
        }

        .nav-item:hover .nav-icon-box,
        .nav-item:focus-visible .nav-icon-box {
            background: var(--color-secondary);
            color: var(--color-base-100);
        }

        .nav-label {
            width: 100%;
            color: currentColor;
            font-size: 0.75rem;
            line-height: 1rem;
            text-align: center;
            overflow-wrap: anywhere;
        }

        .nav-label-text {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .content-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background: var(--color-base-100);
        }

        .content-frame[hidden] {
            display: none;
        }
    </style>
</head>
<body class="light bg-base-200 text-base-content">
    <div class="grid h-screen grid-cols-[4.75rem_minmax(0,1fr)] grid-rows-1 overflow-hidden max-md:grid-cols-1 max-md:grid-rows-[3.75rem_minmax(0,1fr)]">
        <header class="hidden items-center justify-between border-b border-base-300 bg-base-100 px-3 max-md:flex">
            <div class="flex min-w-0 items-center gap-2 font-semibold">
                <span class="mp-icon size-7 shrink-0 text-primary" style="--icon-url: url('/assets/icon/letter-m-square-solid.svg')" aria-hidden="true"></span>
                <span class="truncate">MinimalPanel</span>
            </div>
            <button class="btn btn-square btn-ghost" id="mobileMenuButton" type="button" title="Navigation">
                <span class="mp-icon" style="--icon-url: url('/assets/icon/sidebar.svg')" aria-hidden="true"></span>
            </button>
        </header>

        <aside class="flex min-h-0 flex-col border-r border-base-300 bg-base-100 max-md:fixed max-md:inset-y-0 max-md:left-0 max-md:z-40 max-md:w-20 max-md:-translate-x-full max-md:transition-transform" id="sidebar">
            <div class="grid min-h-16 shrink-0 place-items-center border-b border-base-300">
                <span class="mp-icon desktop-logo-icon text-primary" style="--icon-url: url('/assets/icon/letter-m-square-solid.svg')" aria-hidden="true"></span>
            </div>
            <nav class="flex min-h-0 flex-1 flex-col items-center gap-2 overflow-y-auto px-2 py-3" id="navList" aria-label="Plugin navigation">
                <div class="grid min-h-24 place-items-center text-base-content/50">
                    <span class="loading loading-spinner loading-sm"></span>
                </div>
            </nav>
            <div class="grid shrink-0 place-items-center border-t border-base-300 p-2">
                <a class="btn btn-square btn-ghost text-error" href="/pages/logout.html" title="Logout">
                    <span class="mp-icon" style="--icon-url: url('/assets/icon/logout.svg')" aria-hidden="true"></span>
                </a>
            </div>
        </aside>

        <div class="fixed inset-0 z-30 hidden bg-neutral/40 max-md:block" id="sidebarOverlay" hidden></div>

        <main class="relative min-h-0 min-w-0 overflow-hidden">
            <div class="absolute inset-0 z-10 grid place-items-center bg-base-100 text-base-content/60" id="loadingOverlay">
                <span class="loading loading-spinner loading-md"></span>
            </div>
            <div class="absolute inset-x-4 top-4 z-20 hidden rounded-lg border border-error/20 bg-base-100 p-4 text-sm text-error shadow-sm" id="messageBox" role="status"></div>
            <div class="absolute inset-0 z-0" id="frameStack"></div>
        </main>
    </div>

    <script>
        const navigatorPluginName = "navigator";
        const state = {
            items: [],
            activeName: "",
            order: [],
            ignore: new Set(),
            frames: new Map()
        };

        const els = {
            navList: document.getElementById("navList"),
            frameStack: document.getElementById("frameStack"),
            loadingOverlay: document.getElementById("loadingOverlay"),
            messageBox: document.getElementById("messageBox"),
            sidebar: document.getElementById("sidebar"),
            sidebarOverlay: document.getElementById("sidebarOverlay"),
            mobileMenuButton: document.getElementById("mobileMenuButton")
        };

        function metadataValue(metadata, key) {
            if (!metadata) return "";
            return metadata[key] || metadata[key.charAt(0).toLowerCase() + key.slice(1)] || "";
        }

        function splitList(value) {
            return String(value || "")
                .split(",")
                .map((item) => item.trim())
                .filter(Boolean);
        }

        function normalizeStatus(status) {
            return String(status || "").trim().toLowerCase();
        }

        function isStarted(plugin) {
            const status = normalizeStatus(plugin.status);
            return status === "running" || status === "degraded";
        }

        function pluginDisplayName(plugin) {
            return metadataValue(plugin.metadata, "DisplayName") || plugin.name;
        }

        function readNavigatorConfig(discovered) {
            const nav = discovered.find((plugin) => plugin.name === navigatorPluginName);
            const params = nav && nav.config && nav.config.params ? nav.config.params : {};
            state.order = splitList(params.order);
            state.ignore = new Set(splitList(params.ignore));
        }

        function buildItems(discovered) {
            const orderIndex = new Map(state.order.map((name, index) => [name, index]));
            const ordered = [];
            const rest = [];

            discovered.forEach((plugin, index) => {
                const entry = metadataValue(plugin.metadata, "Entry");
                const icon = metadataValue(plugin.metadata, "Icon");
                if (!entry || state.ignore.has(plugin.name) || !isStarted(plugin)) return;

                const item = {
                    name: plugin.name,
                    label: pluginDisplayName(plugin),
                    entry,
                    icon,
                    iconSolid: metadataValue(plugin.metadata, "IconSolid") || icon,
                    originalIndex: index
                };

                if (orderIndex.has(plugin.name)) {
                    ordered.push(Object.assign(item, { orderIndex: orderIndex.get(plugin.name) }));
                } else {
                    rest.push(item);
                }
            });

            ordered.sort((a, b) => a.orderIndex - b.orderIndex);
            return ordered.concat(rest);
        }

        function iconStyle(url) {
            const safeURL = String(url || "/assets/icon/puzzle.svg").replace(/'/g, "%27");
            return `--icon-url: url('${safeURL}')`;
        }

        function renderNav() {
            if (state.items.length === 0) {
                els.navList.innerHTML = `
                    <div class="grid min-h-32 place-items-center px-1 text-center text-xs leading-snug text-base-content/50">
                        No plugin entries
                    </div>
                `;
                showMessage("No running plugins with Entry metadata were found.");
                els.loadingOverlay.style.display = "none";
                pruneFrames([]);
                return;
            }

            els.navList.innerHTML = state.items.map((item) => {
                const active = item.name === state.activeName;
                const icon = active ? item.iconSolid : item.icon;
                return `
                    <button class="nav-item ${active ? "is-active" : ""}" type="button" data-plugin="${escapeHTML(item.name)}" title="${escapeHTML(item.label)}">
                        <span class="nav-icon-box" aria-hidden="true">
                            <span class="mp-icon shrink-0" style="${escapeHTML(iconStyle(icon))}"></span>
                        </span>
                        <span class="nav-label">
                            <span class="nav-label-text">${escapeHTML(item.label)}</span>
                        </span>
                    </button>
                `;
            }).join("");

            els.navList.querySelectorAll("[data-plugin]").forEach((button) => {
                button.addEventListener("click", () => selectItem(button.dataset.plugin));
            });
        }

        function selectItem(name) {
            const item = state.items.find((candidate) => candidate.name === name);
            if (!item) return;
            state.activeName = item.name;
            renderNav();
            showItem(item);
            closeMobileNav();
        }

        function showItem(item) {
            hideMessage();
            const frame = ensureFrame(item);
            state.frames.forEach((candidate) => {
                candidate.element.hidden = candidate !== frame;
            });
            els.loadingOverlay.style.display = frame.loaded ? "none" : "grid";
        }

        function ensureFrame(item) {
            const existing = state.frames.get(item.name);
            if (existing && existing.entry === item.entry) return existing;

            if (existing) {
                existing.element.remove();
                state.frames.delete(item.name);
            }

            const frameElement = document.createElement("iframe");
            frameElement.className = "content-frame";
            frameElement.title = item.label;
            frameElement.hidden = true;
            frameElement.src = item.entry;

            const frame = {
                entry: item.entry,
                element: frameElement,
                loaded: false
            };

            frameElement.addEventListener("load", () => {
                frame.loaded = true;
                if (state.activeName === item.name) {
                    els.loadingOverlay.style.display = "none";
                }
            });
            frameElement.addEventListener("error", () => {
                if (state.activeName === item.name) {
                    els.loadingOverlay.style.display = "none";
                    showMessage(`Failed to load ${item.label}.`);
                }
            });

            state.frames.set(item.name, frame);
            els.frameStack.appendChild(frameElement);
            return frame;
        }

        function pruneFrames(items) {
            const names = new Set(items.map((item) => item.name));
            state.frames.forEach((frame, name) => {
                if (!names.has(name)) {
                    frame.element.remove();
                    state.frames.delete(name);
                }
            });
        }

        function showMessage(message) {
            els.messageBox.textContent = message;
            els.messageBox.classList.toggle("hidden", !message);
        }

        function hideMessage() {
            showMessage("");
        }

        function escapeHTML(value) {
            return String(value == null ? "" : value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function api(path) {
            const response = await fetch(path, {
                credentials: "include",
                headers: { "Accept": "application/json" }
            });
            const payload = await response.json();
            if (!response.ok || !payload.success) {
                throw new Error(payload.message || payload.error || "Request failed");
            }
            return payload.data || {};
        }

        async function refreshNavigation() {
            try {
                const data = await api("/api/plugins");
                const discovered = Array.isArray(data.discovered) ? data.discovered : [];
                readNavigatorConfig(discovered);
                state.items = buildItems(discovered);

                const stillActive = state.items.some((item) => item.name === state.activeName);
                if (!stillActive) {
                    state.activeName = state.items.length > 0 ? state.items[0].name : "";
                }
                pruneFrames(state.items);

                renderNav();
                if (state.activeName) {
                    const item = state.items.find((candidate) => candidate.name === state.activeName);
                    if (item) showItem(item);
                }
            } catch (err) {
                els.loadingOverlay.style.display = "none";
                showMessage(err.message || "Failed to load plugin navigation.");
                els.navList.innerHTML = `
                    <button class="btn btn-square btn-ghost text-error" type="button" id="retryButton" title="Retry">
                        <span class="mp-icon" style="--icon-url: url('/assets/icon/refresh.svg')" aria-hidden="true"></span>
                    </button>
                `;
                document.getElementById("retryButton").addEventListener("click", refreshNavigation);
            }
        }

        function openMobileNav() {
            els.sidebar.classList.remove("max-md:-translate-x-full");
            els.sidebarOverlay.hidden = false;
            els.sidebarOverlay.classList.remove("hidden");
        }

        function closeMobileNav() {
            els.sidebar.classList.add("max-md:-translate-x-full");
            els.sidebarOverlay.hidden = true;
            els.sidebarOverlay.classList.add("hidden");
        }

        els.mobileMenuButton.addEventListener("click", openMobileNav);
        els.sidebarOverlay.addEventListener("click", closeMobileNav);

        window.addEventListener("resize", () => {
            if (window.innerWidth > 768) closeMobileNav();
        });

        refreshNavigation();
    </script>
</body>
</html>
