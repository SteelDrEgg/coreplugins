<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/scheme.css">
    <link rel="stylesheet" href="/assets/css/daisyui@5.css" type="text/css">
    <script src="/assets/css/tailwindcss@4"></script>
    <title>Plugins</title>
    <style>
        .icon {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            background: currentColor;
            mask: var(--icon-url) no-repeat center;
            mask-size: contain;
            -webkit-mask: var(--icon-url) no-repeat center;
            -webkit-mask-size: contain;
        }

        .icon.refresh {
            --icon-url: url("/assets/icon/refresh.svg");
        }

        .icon.hard-drive {
            --icon-url: url("/assets/icon/hard-drive.svg");
        }

        .icon.puzzle {
            --icon-url: url("/assets/icon/puzzle.svg");
        }

        .icon.puzzle-solid {
            --icon-url: url("/assets/icon/puzzle-solid.svg");
        }

        .icon.stop {
            --icon-url: url("/assets/icon/stop.svg");
        }
    </style>
</head>
<body class="light min-h-screen bg-base-200 text-base-content">
    <main class="mx-auto grid w-full max-w-[1320px] gap-4 px-4 py-6 sm:py-8">
        <header class="flex min-w-0 max-w-full flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex min-w-0 items-center gap-3">
                <div class="grid size-10 shrink-0 place-items-center rounded-lg bg-primary text-primary-content" aria-hidden="true">
                    <span class="icon puzzle-solid size-5"></span>
                </div>
                <div class="min-w-0">
                    <h1 class="text-xl font-semibold tracking-normal">Plugins</h1>
                    <div class="truncate text-sm text-base-content/60" id="pathSummary">Loading plugin state...</div>
                </div>
            </div>
            <div class="flex w-full min-w-0 flex-col gap-2 sm:w-auto sm:flex-row">
                <button class="btn w-full sm:w-auto" id="reloadBtn" type="button" title="Reload">
                    <span class="icon refresh" aria-hidden="true"></span>
                    Reload
                </button>
                <button class="btn btn-primary w-full sm:w-auto" id="scanBtn" type="button" title="Scan plugin directory">
                    <span class="icon hard-drive" aria-hidden="true"></span>
                    Scan
                </button>
            </div>
        </header>

        <section class="grid min-w-0 max-w-full gap-3 sm:grid-cols-2 lg:grid-cols-5" aria-label="Plugin status">
            <div class="stat min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                <div class="stat-title">Discovered</div>
                <div class="stat-value text-2xl" id="discoveredCount">0</div>
            </div>
            <div class="stat min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                <div class="stat-title">Running</div>
                <div class="stat-value text-2xl" id="runningCount">0</div>
            </div>
            <div class="stat min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                <div class="stat-title">Degraded</div>
                <div class="stat-value text-2xl" id="degradedCount">0</div>
            </div>
            <div class="stat min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                <div class="stat-title">Inactive</div>
                <div class="stat-value text-2xl" id="inactiveCount">0</div>
            </div>
            <div class="stat min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                <div class="stat-title">Failed</div>
                <div class="stat-value text-2xl" id="failedCount">0</div>
            </div>
        </section>

        <section class="grid min-w-0 max-w-full gap-4 lg:grid-cols-[minmax(0,1fr)_320px]">
            <div class="card min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                <div class="flex min-w-0 flex-col gap-3 border-b border-base-300 p-4 sm:flex-row sm:items-center sm:justify-between">
                    <div class="font-semibold">Catalog</div>
                    <div class="flex min-w-0 flex-col gap-2 sm:flex-row">
                        <input class="input w-full sm:w-64" id="searchInput" type="search" placeholder="Search name or path">
                        <select class="select w-full sm:w-40" id="statusFilter" aria-label="Status filter">
                            <option value="all">All</option>
                            <option value="running">Running</option>
                            <option value="degraded">Degraded</option>
                            <option value="inactive">Inactive</option>
                            <option value="busy">Busy</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                </div>
                <div class="min-w-0" id="pluginContent">
                    <div class="grid min-h-56 place-items-center p-6 text-center text-base-content/60">
                        <span class="loading loading-spinner loading-md"></span>
                    </div>
                </div>
            </div>

            <aside class="grid min-w-0 gap-4 self-start">
                <div class="card min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                    <div class="border-b border-base-300 p-4 font-semibold">Config</div>
                    <form class="card-body gap-4 p-4" id="configForm">
                        <label class="grid gap-2">
                            <span class="text-sm font-semibold text-base-content/70">Plugin directory</span>
                            <input class="input w-full font-mono text-xs" id="pluginDir" name="plugin_dir" autocomplete="off">
                        </label>
                        <label class="grid gap-2">
                            <span class="text-sm font-semibold text-base-content/70">Temp directory</span>
                            <input class="input w-full font-mono text-xs" id="pluginTempDir" name="plugin_temp_dir" autocomplete="off">
                        </label>
                        <button class="btn btn-primary" id="saveConfigBtn" type="submit">Save Config</button>
                        <div class="alert hidden text-sm" id="messageBox" role="status"></div>
                    </form>
                </div>

                <div class="card min-w-0 rounded-lg border border-base-300 bg-base-100 shadow-sm">
                    <div class="border-b border-base-300 p-4 font-semibold">Runtime</div>
                    <div class="grid gap-3 p-4" id="runtimeList">
                        <div class="grid min-h-32 place-items-center text-center text-base-content/60">No running plugins</div>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <script>
        const state = {
            discovered: [],
            running: [],
            pluginDir: "",
            pluginTempDir: "",
            busy: false
        };

        const els = {
            pathSummary: document.getElementById("pathSummary"),
            discoveredCount: document.getElementById("discoveredCount"),
            runningCount: document.getElementById("runningCount"),
            degradedCount: document.getElementById("degradedCount"),
            inactiveCount: document.getElementById("inactiveCount"),
            failedCount: document.getElementById("failedCount"),
            reloadBtn: document.getElementById("reloadBtn"),
            scanBtn: document.getElementById("scanBtn"),
            pluginContent: document.getElementById("pluginContent"),
            runtimeList: document.getElementById("runtimeList"),
            searchInput: document.getElementById("searchInput"),
            statusFilter: document.getElementById("statusFilter"),
            configForm: document.getElementById("configForm"),
            pluginDir: document.getElementById("pluginDir"),
            pluginTempDir: document.getElementById("pluginTempDir"),
            saveConfigBtn: document.getElementById("saveConfigBtn"),
            messageBox: document.getElementById("messageBox")
        };

        function escapeHTML(value) {
            return String(value == null ? "" : value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function api(path, options) {
            const response = await fetch(path, Object.assign({
                credentials: "include",
                headers: { "Accept": "application/json" }
            }, options || {}));
            let payload = null;
            try {
                payload = await response.json();
            } catch (err) {
                throw new Error("Invalid server response");
            }
            if (!response.ok || !payload.success) {
                throw new Error(payload.message || payload.error || "Request failed");
            }
            return payload;
        }

        function setBusy(value) {
            state.busy = value;
            els.reloadBtn.disabled = value;
            els.scanBtn.disabled = value;
            els.saveConfigBtn.disabled = value;
            document.querySelectorAll("[data-plugin-action]").forEach((button) => {
                const status = normalizeStatus(button.dataset.pluginStatus);
                const action = button.dataset.pluginAction;
                button.disabled = value || !canRunAction(action, status);
            });
        }

        function showMessage(text, kind) {
            const kindClass = kind === "ok" ? "alert-success" : kind === "error" ? "alert-error" : "alert-info";
            els.messageBox.textContent = text || "";
            els.messageBox.className = text ? `alert ${kindClass} text-sm` : "alert hidden text-sm";
        }

        function pluginDisplayName(plugin) {
            if (plugin.metadata && plugin.metadata.DisplayName) return plugin.metadata.DisplayName;
            if (plugin.metadata && plugin.metadata.display_name) return plugin.metadata.display_name;
            return plugin.name;
        }

        function pluginIcon(plugin) {
            if (plugin.metadata && plugin.metadata.Icon) return plugin.metadata.Icon;
            if (plugin.metadata && plugin.metadata.icon) return plugin.metadata.icon;
            return "/assets/icon/puzzle.svg";
        }

        function iconStyle(url) {
            const safeURL = String(url || "/assets/icon/puzzle.svg").replace(/'/g, "%27");
            return `--icon-url: url('${safeURL}')`;
        }

        function stripPluginsPrefix(path) {
            const value = String(path || "").trim();
            if (!value) return "-";
            const stripped = value.replace(/^(?:\.[\\/])?plugins(?:[\\/]+|$)/, "");
            return stripped || "-";
        }

        function pluginPackagePath(plugin) {
            return stripPluginsPrefix(plugin.package_path);
        }

        function normalizeStatus(status) {
            const value = String(status || "").trim().toLowerCase();
            return value || "discovered";
        }

        function isRunningStatus(status) {
            return status === "running";
        }

        function isDegradedStatus(status) {
            return status === "degraded";
        }

        function isActiveStatus(status) {
            return isRunningStatus(status) || isDegradedStatus(status);
        }

        function isBusyStatus(status) {
            return status === "starting" || status === "stopping";
        }

        function isInactiveStatus(status) {
            return status === "discovered";
        }

        function canRunAction(action, status) {
            if (isBusyStatus(status)) return false;
            if (action === "start") return status === "discovered" || status === "failed";
            if (action === "stop" || action === "restart") return isActiveStatus(status);
            return false;
        }

        function statusLabel(status) {
            const labels = {
                discovered: "Inactive",
                starting: "Starting",
                running: "Running",
                degraded: "Degraded",
                stopping: "Stopping",
                failed: "Failed"
            };
            return labels[status] || status.charAt(0).toUpperCase() + status.slice(1);
        }

        function statusClass(status) {
            const classes = {
                discovered: "badge-warning",
                starting: "badge-info",
                running: "badge-success",
                degraded: "badge-warning",
                stopping: "badge-info",
                failed: "badge-error"
            };
            return classes[status] || "badge-neutral";
        }

        function filteredPlugins() {
            const query = els.searchInput.value.trim().toLowerCase();
            const filter = els.statusFilter.value;
            return state.discovered.filter((plugin) => {
                const status = normalizeStatus(plugin.status);
                if (filter === "running" && !isRunningStatus(status)) return false;
                if (filter === "degraded" && !isDegradedStatus(status)) return false;
                if (filter === "inactive" && !isInactiveStatus(status)) return false;
                if (filter === "busy" && !isBusyStatus(status)) return false;
                if (filter === "failed" && status !== "failed") return false;
                if (!query) return true;
                const haystack = [
                    plugin.name,
                    plugin.version,
                    plugin.type,
                    plugin.package_path,
                    plugin.command,
                    pluginDisplayName(plugin)
                ].join(" ").toLowerCase();
                return haystack.includes(query);
            });
        }

        function renderStats() {
            const running = state.discovered.filter((plugin) => isRunningStatus(normalizeStatus(plugin.status))).length;
            const degraded = state.discovered.filter((plugin) => isDegradedStatus(normalizeStatus(plugin.status))).length;
            const inactive = state.discovered.filter((plugin) => isInactiveStatus(normalizeStatus(plugin.status))).length;
            const failed = state.discovered.filter((plugin) => normalizeStatus(plugin.status) === "failed").length;
            els.discoveredCount.textContent = state.discovered.length;
            els.runningCount.textContent = running;
            els.degradedCount.textContent = degraded;
            els.inactiveCount.textContent = inactive;
            els.failedCount.textContent = failed;
            els.pathSummary.textContent = state.pluginDir ? state.pluginDir : "No plugin directory configured";
        }

        function emptyState(text) {
            return `<div class="grid min-h-56 place-items-center p-6 text-center text-base-content/60">${escapeHTML(text)}</div>`;
        }

        function renderPlugins() {
            const items = filteredPlugins();
            if (!items.length) {
                els.pluginContent.innerHTML = emptyState("No plugins found");
                return;
            }

            const rows = items.map((plugin) => {
                const status = normalizeStatus(plugin.status);
                const statusText = statusLabel(status);
                const packagePath = pluginPackagePath(plugin);
                const startDisabled = canRunAction("start", status) ? "" : "disabled";
                const restartDisabled = canRunAction("restart", status) ? "" : "disabled";
                const stopDisabled = canRunAction("stop", status) ? "" : "disabled";
                const icon = pluginIcon(plugin);
                return `
                    <tr>
                        <td>
                            <div class="flex min-w-52 items-center gap-3">
                                <div class="grid size-8 shrink-0 place-items-center rounded-lg bg-accent/20 text-accent-content">
                                    <span class="icon" style="${escapeHTML(iconStyle(icon))}" aria-hidden="true"></span>
                                </div>
                                <div class="min-w-0">
                                    <div class="truncate font-semibold" title="${escapeHTML(plugin.name)}">${escapeHTML(pluginDisplayName(plugin))}</div>
                                    <div class="truncate text-xs text-base-content/60">${escapeHTML(plugin.name)} v${escapeHTML(plugin.version || "-")}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge ${statusClass(status)}">${escapeHTML(statusText)}</span></td>
                        <td><span class="badge badge-neutral">${escapeHTML(plugin.type || "-")}</span></td>
                        <td class="max-w-64 truncate font-mono text-xs text-base-content/70" title="${escapeHTML(packagePath)}">${escapeHTML(packagePath)}</td>
                        <td>
                            <div class="flex min-w-52 flex-wrap items-center gap-2">
                                <button class="btn btn-sm" type="button" data-plugin-action="start" data-plugin-name="${escapeHTML(plugin.name)}" data-plugin-status="${escapeHTML(status)}" ${startDisabled} title="Start">
                                    <span class="icon puzzle" aria-hidden="true"></span>
                                    Start
                                </button>
                                <button class="btn btn-sm" type="button" data-plugin-action="restart" data-plugin-name="${escapeHTML(plugin.name)}" data-plugin-status="${escapeHTML(status)}" ${restartDisabled} title="Restart">
                                    <span class="icon refresh" aria-hidden="true"></span>
                                    Restart
                                </button>
                                <button class="btn btn-sm" type="button" data-plugin-action="stop" data-plugin-name="${escapeHTML(plugin.name)}" data-plugin-status="${escapeHTML(status)}" ${stopDisabled} title="Stop">
                                    <span class="icon stop" aria-hidden="true"></span>
                                    Stop
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join("");

            els.pluginContent.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="table table-zebra min-w-[760px]">
                        <thead>
                            <tr>
                                <th>Plugin</th>
                                <th>Status</th>
                                <th>Type</th>
                                <th>Package</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        function renderRuntime() {
            if (!state.running.length) {
                els.runtimeList.innerHTML = '<div class="grid min-h-32 place-items-center text-center text-base-content/60">No running plugins</div>';
                return;
            }
            els.runtimeList.innerHTML = state.running.map((item) => {
                const routes = Array.isArray(item.routes) ? item.routes.length : 0;
                const staticMounts = Array.isArray(item.static) ? item.static.length : 0;
                const namespaces = Array.isArray(item.namespaces) ? item.namespaces.length : 0;
                const runtimePath = stripPluginsPrefix(item.path);
                return `
                    <div class="rounded-lg border border-base-300 p-3">
                        <div class="flex items-center justify-between gap-2 font-semibold">
                            <span class="truncate">${escapeHTML(item.name || item.instance_id)}</span>
                            <span class="badge badge-success">${escapeHTML(item.type || "-")}</span>
                        </div>
                        <div class="mt-2 grid gap-1 text-xs text-base-content/60">
                            <div class="truncate font-mono" title="${escapeHTML(runtimePath)}">${escapeHTML(runtimePath)}</div>
                            <div>${routes} routes / ${staticMounts} static / ${namespaces} sockets</div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderAll() {
            renderStats();
            renderPlugins();
            renderRuntime();
            setBusy(state.busy);
        }

        async function loadState(showOk) {
            const payload = await api("/api/plugins");
            const data = payload.data || {};
            state.discovered = (data.discovered || []).map((plugin) => {
                return Object.assign({}, plugin, { status: normalizeStatus(plugin.status) });
            });
            state.running = data.running || [];
            state.pluginDir = data.plugin_dir || "";
            state.pluginTempDir = data.plugin_temp_dir || "";
            els.pluginDir.value = state.pluginDir;
            els.pluginTempDir.value = state.pluginTempDir;
            renderAll();
            if (showOk) showMessage(payload.message || "Plugin state loaded", "ok");
        }

        async function scanPlugins() {
            setBusy(true);
            showMessage("", "");
            try {
                const payload = await api("/api/plugins/scan", { method: "POST" });
                await loadState(false);
                showMessage(payload.message || "Plugin directory scanned", "ok");
            } catch (err) {
                showMessage(err.message, "error");
            } finally {
                setBusy(false);
            }
        }

        async function runPluginAction(action, name) {
            setBusy(true);
            showMessage("", "");
            try {
                const payload = await api(`/api/plugins/${action}`, {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name })
                });
                await loadState(false);
                showMessage(payload.message || `Plugin ${action} completed`, "ok");
            } catch (err) {
                showMessage(err.message, "error");
            } finally {
                setBusy(false);
            }
        }

        async function saveConfig(event) {
            event.preventDefault();
            setBusy(true);
            showMessage("", "");
            try {
                const payload = await api("/api/plugins/config", {
                    method: "PUT",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        plugin_dir: els.pluginDir.value.trim(),
                        plugin_temp_dir: els.pluginTempDir.value.trim()
                    })
                });
                await loadState(false);
                const restart = payload.data && payload.data.temp_dir_requires_restart;
                showMessage(restart ? "Config saved. Temp directory changes need restart." : "Config saved", "ok");
            } catch (err) {
                showMessage(err.message, "error");
            } finally {
                setBusy(false);
            }
        }

        els.reloadBtn.addEventListener("click", async () => {
            setBusy(true);
            showMessage("", "");
            try {
                await loadState(true);
            } catch (err) {
                showMessage(err.message, "error");
            } finally {
                setBusy(false);
            }
        });

        els.scanBtn.addEventListener("click", scanPlugins);
        els.configForm.addEventListener("submit", saveConfig);
        els.searchInput.addEventListener("input", renderPlugins);
        els.statusFilter.addEventListener("change", renderPlugins);
        els.pluginContent.addEventListener("click", (event) => {
            const button = event.target.closest("[data-plugin-action]");
            if (!button || button.disabled) return;
            runPluginAction(button.dataset.pluginAction, button.dataset.pluginName);
        });

        loadState(false).catch((err) => {
            els.pluginContent.innerHTML = emptyState("Failed to load plugin state");
            showMessage(err.message, "error");
        });
    </script>
</body>
</html>
