<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SSH Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/scheme.css">
    <link rel="stylesheet" href="/assets/css/daisyui@5.css">
    <link rel="stylesheet" href="/ssh/assets/terminal/xterm.min.css">
    <link rel="stylesheet" href="/ssh/assets/terminal/terminal.css">
    <script src="/assets/css/tailwindcss@4"></script>
    <script src="/assets/js/sdk.js"></script>
    <script>window.module = { exports: {} };</script>
    <script src="/assets/vendor/culori.js"></script>
    <script>
        window.culori = window.module.exports;
        delete window.module;
    </script>
</head>
<body class="light min-h-screen bg-base-200 text-base-content">
    <header class="navbar min-h-16 border-b border-base-300 bg-base-100 px-4">
        <div class="min-w-0 flex-1">
            <div class="badge min-w-0 max-w-full gap-2 px-3 py-3">
                <span class="status-indicator" id="statusIndicator" aria-hidden="true"></span>
                <span class="truncate" id="statusText" role="status">Not connected</span>
            </div>
        </div>
        <button id="connectBtn" class="btn btn-primary" type="button">Connect</button>
    </header>

    <main class="terminal-container bg-base-100">
        <div id="terminal" aria-label="SSH terminal"></div>
    </main>

    <dialog id="connectionModal" class="modal modal-bottom sm:modal-middle" aria-labelledby="connectionTitle">
        <div class="modal-box w-11/12 max-w-md rounded-lg border border-base-300">
            <button id="closeModalBtn" class="btn btn-ghost btn-sm btn-square absolute right-3 top-3" type="button" aria-label="Close">×</button>
            <div class="flex items-center justify-between gap-3 border-b border-base-300 pb-4">
                <h1 id="connectionTitle" class="text-lg font-semibold tracking-normal">SSH Connection</h1>
            </div>

            <form id="connectionForm" class="mt-5 grid gap-4">
                <label class="grid gap-2">
                    <span class="text-sm font-medium text-base-content/70">Host</span>
                    <input class="input w-full" type="text" id="host" placeholder="e.g., example.com" value="localhost" autocomplete="url" required>
                </label>
                <label class="grid gap-2">
                    <span class="text-sm font-medium text-base-content/70">Port</span>
                    <input class="input w-full" type="number" id="port" placeholder="22" value="22" min="1" max="65535" inputmode="numeric" required>
                </label>
                <label class="grid gap-2">
                    <span class="text-sm font-medium text-base-content/70">Username</span>
                    <input class="input w-full" type="text" id="username" placeholder="Enter username" autocomplete="username" required>
                </label>

                <div class="tabs-box tabs mt-1 grid grid-cols-2" role="tablist" aria-label="Authentication method">
                    <button class="tab auth-tab active" type="button" data-auth="password" role="tab" aria-selected="true">Password</button>
                    <button class="tab auth-tab" type="button" data-auth="key" role="tab" aria-selected="false">Private Key</button>
                </div>

                <section id="password-auth" class="auth-content active" role="tabpanel">
                    <label class="grid gap-2">
                        <span class="text-sm font-medium text-base-content/70">Password</span>
                        <input class="input w-full" type="password" id="password" autocomplete="current-password" placeholder="Enter password">
                    </label>
                </section>

                <section id="key-auth" class="auth-content" role="tabpanel" hidden>
                    <div class="grid gap-4">
                        <label class="grid gap-2">
                            <span class="text-sm font-medium text-base-content/70">Private Key Path</span>
                            <input class="input w-full" type="text" id="privateKey" placeholder="e.g., ~/.ssh/id_ed25519">
                        </label>
                        <label class="grid gap-2">
                            <span class="text-sm font-medium text-base-content/70">Passphrase (optional)</span>
                            <input class="input w-full" type="password" id="passphrase" autocomplete="off" placeholder="Enter passphrase if required">
                        </label>
                    </div>
                </section>

                <button id="submitBtn" class="btn btn-primary mt-1 w-full" type="submit">Connect</button>
            </form>
        </div>
    </dialog>

    <script src="/ssh/assets/terminal/socket.io.min.js"></script>
    <script src="/ssh/assets/terminal/xterm.min.js"></script>
    <script src="/ssh/assets/terminal/xterm-addon-fit.min.js"></script>
    <script src="/ssh/assets/terminal/terminal.js"></script>
</body>
</html>
