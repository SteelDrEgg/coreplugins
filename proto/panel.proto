syntax = "proto3";

package panel.v1;

option go_package = "arupa/pluginsdk/proto";

// ===== common request context and access =====
message User {
  string username = 1;
  repeated string groups = 2;
}

message AccessPolicy {
  // Require any authenticated user when groups is empty.
  bool require_auth = 1;
  // A non-empty list requires membership in at least one group.
  repeated string groups = 2;
}

// ===== HTTP =====
message HTTPRoute {
  string method = 1;  // GET/POST/...; empty = any method
  string pattern = 2; // e.g. "/hello", "/api/foo/"
  AccessPolicy access = 3;
}

message HTTPRequest {
  string route_pattern = 1; // the pattern this request matched
  string method = 2;
  string path = 3;
  string query = 4;
  map<string, string> headers = 5;
  bytes body = 6;
  string remote_addr = 7;
  User user = 8;
}

message HTTPResponse {
  int32 status = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}

// ===== static files =====
message StaticMount {
  string prefix = 1;    // URL path prefix, e.g. "/assets/"
  string directory = 2; // host directory path to serve
  AccessPolicy access = 3;
}

// ===== socket.io =====
message SocketNamespace {
  string name = 1;            // e.g. "/hello"
  repeated string events = 2; // events the plugin handles
  AccessPolicy access = 3;
  map<string, AccessPolicy> event_access = 4; // optional event-specific policies
}

message SocketEvent {
  string namespace = 1;
  string event = 2;
  string socket_id = 3;
  bytes payload = 4; // JSON-encoded event arguments
  User user = 5;
}

message EmitInstruction {
  string namespace = 1;
  string target = 2; // socket id, or empty for broadcast to namespace
  string event = 3;
  bytes payload = 4; // JSON-encoded emit arguments
}

message SocketEventReply {
  // Emits returned in-reply (used by WASM where the plugin cannot push
  // spontaneously). gRPC plugins may also use the Host.Emit callback.
  repeated EmitInstruction emits = 1;
}

// ===== registration =====
message RegisterRequest {
  string instance_id = 1;
  string host_callback_addr = 2;  // gRPC plugins dial this to call Host.*; WASM ignores
  string host_callback_token = 3; // auth token for host callbacks; WASM ignores
  map<string, string> params = 4; // host-provided config params from [Plugins.<name>.params]
}

message RegisterReply {
  string name = 1;
  string version = 2;
  repeated HTTPRoute http_routes = 3;
  repeated SocketNamespace socket_namespaces = 4;
  repeated StaticMount static_mounts = 5;
}

// ===== KV =====
message KVGetRequest {
  string namespace = 1;
  string key = 2;
}
message KVGetReply {
  bool found = 1;
  bytes value = 2;
}
message KVSetRequest {
  string namespace = 1;
  string key = 2;
  bytes value = 3;
}
message KVSetReply { string error = 1; }
message KVDeleteRequest {
  string namespace = 1;
  string key = 2;
}
message KVDeleteReply { string error = 1; }
message KVListRequest { string namespace = 1; } // empty namespace = list namespace names
message KVListReply { repeated string keys = 1; }

message EmitReply { string error = 1; }

// ===== persisted plugin params =====
message ParamsPatchRequest {
  map<string, string> set = 1;
  repeated string delete = 2;
}
message ParamsPatchReply { string error = 1; }

// ===== plugin messages =====
message PluginMessage {
  string source = 1; // set by host to the registered plugin name; caller-supplied values are ignored
  string target = 2; // registered plugin name to deliver to
  string topic = 3;
  bytes payload = 4;
}

message PluginMessageReply {
  string error = 1;
  string message = 2;
}

message LogRequest {
  string level = 1;
  string message = 2;
}
message LogReply {}

// host -> plugin (shared by both backends, all unary)
// go:plugin type=plugin version=1
service Plugin {
  rpc Register(RegisterRequest) returns (RegisterReply);
  rpc HandleHTTP(HTTPRequest) returns (HTTPResponse);
  rpc HandleSocketEvent(SocketEvent) returns (SocketEventReply);
  rpc HandlePluginMessage(PluginMessage) returns (PluginMessageReply);
}

// plugin -> host (shared service for both backends)
// WASM: protoc-gen-go-plugin generates host functions imported by the module.
// gRPC: protoc-gen-go-grpc generates a standard server the host runs on
//       localhost; plugins dial host_callback_addr to call these.
// go:plugin type=host
service Host {
  rpc KVGet(KVGetRequest) returns (KVGetReply);
  rpc KVSet(KVSetRequest) returns (KVSetReply);
  rpc KVDelete(KVDeleteRequest) returns (KVDeleteReply);
  rpc KVList(KVListRequest) returns (KVListReply);
  rpc PatchParams(ParamsPatchRequest) returns (ParamsPatchReply);
  rpc Emit(EmitInstruction) returns (EmitReply);
  rpc SendPluginMessage(PluginMessage) returns (PluginMessageReply);
  rpc Log(LogRequest) returns (LogReply);
}
